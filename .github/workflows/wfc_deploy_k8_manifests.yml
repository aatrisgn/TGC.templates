
# .github/workflows/build.yml in shared repo
name: Deploy Scaleway Terraform

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      var_file_path:
        required: true
        type: string
      applyTF:
        required: true
        type: string
      state_key:
        required: true
        type: string
      application_repo:
        required: true
        type: string
      image_name:
        required: true
        type: string
      container_registry:
        required: true
        type: string
      app_version:
        required: true
        type: string
        default: latest
      helm_output_dir:
        required: true
        type: string

      helm_input_values_file:
        required: true
        type: string

    secrets:
      organization_id:
        required: true
      deployment_access_key:
        required: true
      deployment_secret_access_key:
        required: true
      state_access_key:
        required: true
      state_secret_access_key:
        required: true
      state_bucket_name:
        required: true
      github_argo_token:
        required: true
      
jobs:
  generate_manifests:
    runs-on: ubuntu-latest
    name: Generate K8 manifests
    env:
      SCW_ACCESS_KEY: "${{ secrets.deployment_access_key }}"
      SCW_SECRET_KEY: "${{ secrets.deployment_secret_access_key }}"
      SCW_DEFAULT_ORGANIZATION_ID: "${{ secrets.organization_id }}"

    steps:
      - name: Install Terraform
        uses: aatrisgn/TGC.Templates/actions/install_terraform@main
      
      - name: Install Scaleway CLI
        uses: aatrisgn/TGC.Templates/actions/install_scaleway@main

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - uses: actions/checkout@v4
        with:
          path: ${{ inputs.application_repo }}

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.github_argo_token }}
          path: argocd
          ref: main

      - name: Fetch latest image version
        uses: aatrisgn/TGC.Templates/actions/fetch_latest_image_version@main
        id: resolve_tag
        with:
          inputTag: "${{ inputs.app_version }}"
          imageName: "${{ inputs.image_name }}"
          registry: "${{ inputs.container_registry }}"

      - name: Render manifests
        run: |
          helm template backend ./helm \
            -f ${{ inputs.helm_input_values_file }} \
            --set image.tag=${{ steps.resolve_tag.outputs.image_version }} \
            --output-dir ${{ inputs.helm_output_dir }}
        working-directory: ${{ inputs.application_repo }}

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=access_key="${{ secrets.state_access_key }}" \
          -backend-config=secret_key="${{ secrets.state_secret_access_key }}" \
          -backend-config=bucket="${{ secrets.state_bucket_name }}" \
          -backend-config=key="${{ inputs.state_key }}.tfstate"
        working-directory: ${{ inputs.working_directory }}
          
      - name: Terraform Validate
        run: terraform validate
        working-directory: ${{ inputs.working_directory }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var-file="${{ inputs.var_file_path }}" -out=tfplan
        working-directory: ${{ inputs.working_directory }}

      - name: Terraform Apply
        if: inputs.applyTF == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ inputs.working_directory }}

      - name: Commit rendered manifests
        run: |
          cd argocd && git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "[${{ inputs.application_repo }}] chore: render dev manifests [${{ steps.resolve_tag.outputs.image_version }}]"
          git push