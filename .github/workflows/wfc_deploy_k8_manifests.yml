
# .github/workflows/build.yml in shared repo
name: Deploy Scaleway Terraform

on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string
      applyTF:
        required: true
        type: string
      var_file_path:
        required: true
        type: string
      state_key:
        required: true
        type: string

    secrets:
      organization_id:
        required: true
      deployment_access_key:
        required: true
      deployment_secret_access_key:
        required: true
      state_access_key:
        required: true
      state_secret_access_key:
        required: true
      state_bucket_name:
        required: true
      github_token:
        required: true
      

jobs:
  generate_manifests:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    runs-on: ubuntu-latest
    name: Generate DEV manifests
    env:
      SCW_ACCESS_KEY: "${{ secrets.deployment_access_key }}"
      SCW_SECRET_KEY: "${{ secrets.deployment_secret_access_key }}"
      SCW_DEFAULT_ORGANIZATION_ID: "${{ secrets.organization_id }}"

    steps:
      - name: Install Terraform
        uses: aatrisgn/TGC.Templates/actions/install_terraform@main
      
      - name: Install Scaleway CLI
        uses: aatrisgn/TGC.Templates/actions/install_scaleway@main

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - uses: actions/checkout@v4
        with:
          path: asgerthyregoddk #Figuyre out

      - name: Checkout ArgoCD repo
        uses: actions/checkout@v4
        with:
          repository: aatrisgn/TGC.ArgoCD
          token: ${{ secrets.github_token }}
          path: argocd


      - name: Install Scaleway CLI
        uses: aatrisgn/TGC.Templates/actions/fetch_latest_image_version@main
        id: resolve_tag
        with:
          inputTag: "${{ github.event.inputs.version || 'latest' }}"
          imageName: "tgc-atdk-app"
          registry: "crn-shared-prd-scr-lz-fr-par"

      # # TODO: Rewrite this
      # - name: Resolve image tag
      #   id: resolve_tag
      #   uses: azure/powershell@v3
      #   with:
      #     azPSVersion: latest
      #     inlineScript: |
      #       ./asgerthyregoddk/.github/scripts/fetch_latest_image_version.ps1 `
      #         -registryNamespace "crn-shared-prd-scr-lz-fr-par" `
      #         -imageName "tgc-atdk-app" `
      #         -inputTag "${{ github.event.inputs.version || 'latest' }}"

      - name: Render manifests
        run: |
          helm template backend ./helm \
            -f ./helm/values-dev.yaml \
            --set image.tag=${{ steps.resolve_tag.outputs.IMAGE_TAG }} \
            --output-dir ./deployment/dev
        working-directory: asgerthyregoddk

      - name: Terraform Init
        run: |
          terraform init \
          -backend-config=access_key="${{ secrets.ASGERTHYREGODDK_PRD_STATE_ACCESS_KEY }}" \
          -backend-config=secret_key="${{ secrets.ASGERTHYREGODDK_PRD_STATE_SECRET_ACCESS_KEY }}" \
          -backend-config=bucket="${{ secrets.ASGERTHYREGODDK_PRD_STATE_BUCKET_NAME }}" \
          -backend-config=key="asgerthyregoddk.deployment.dev"
        working-directory: asgerthyregoddk/terraform/deployment
          
      - name: Terraform Validate
        run: terraform validate
        working-directory: asgerthyregoddk/terraform/deployment

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -var-file="envs/vars.dev.tfvars" -out=tfplan
        working-directory: asgerthyregoddk/terraform/deployment

      - name: Terraform Apply
        if: github.event.inputs.applyTF == 'true'
        run: terraform apply -auto-approve tfplan
        working-directory: asgerthyregoddk/terraform/deployment

      - name: Commit rendered manifests
        run: |
          cd argocd && git pull
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git diff --cached --quiet || git commit -m "[TGC.AsgerThyregodDK] chore: render dev manifests [${{ steps.resolve_tag.outputs.IMAGE_TAG }}]"
          git push